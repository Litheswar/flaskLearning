
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body-wrap {
    display: block;
    font-family: var(--font-sans);
  }

  #race-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    z-index: 0;
  }

  .road {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 38%;
    background: #2d2d2d;
  }

  .road-line {
    position: absolute;
    top: 50%;
    height: 6px;
    width: 90px;
    background: #f0c040;
    border-radius: 3px;
    animation: roadMove 0.7s linear infinite;
  }

  @keyframes roadMove {
    from { transform: translateX(0); }
    to { transform: translateX(-140px); }
  }

  .sky-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 62%;
    background: linear-gradient(180deg, #0d0d1e 0%, #1a1a3c 50%, #2d2050 100%);
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .mountain {
    position: absolute;
    bottom: 38%;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .building {
    position: absolute;
    bottom: 38%;
    background: #1c1c3a;
    border-top: 2px solid #2a2a5a;
  }

  .building-win {
    position: absolute;
    background: #f0c040;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: blink 0.8s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .crowd-person {
    position: absolute;
    bottom: 38%;
    width: 8px;
    height: 16px;
    border-radius: 4px 4px 0 0;
    animation: cheer 0.6s ease-in-out infinite alternate;
  }

  @keyframes cheer {
    from { transform: scaleY(1); }
    to { transform: scaleY(0.85); }
  }

  .car {
    position: absolute;
    bottom: calc(38% + 10px);
    width: 90px;
    height: 36px;
    border-radius: 8px 20px 4px 4px;
    animation: drive 6s linear infinite;
  }

  .car::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 18px;
    width: 45px;
    height: 20px;
    border-radius: 10px 14px 4px 4px;
  }

  .car::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 8px;
    width: 22px;
    height: 22px;
    background: #111;
    border-radius: 50%;
    box-shadow: 50px 0 0 #111;
  }

  .car-stripe {
    position: absolute;
    top: 8px;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  .car1 { background: #e63946; animation-duration: 4.8s; bottom: calc(38% + 14px); }
  .car1::before { background: #c1121f; }

  .car2 { background: #4cc9f0; animation-duration: 5.6s; bottom: calc(38% + 54px); }
  .car2::before { background: #0096c7; }

  .car3 { background: #f8c100; animation-duration: 6.1s; bottom: calc(38% + 94px); }
  .car3::before { background: #e09000; }

  .exhaust {
    position: absolute;
    top: 50%;
    right: -6px;
    width: 12px;
    height: 8px;
    background: rgba(200,200,200,0.5);
    border-radius: 50%;
    animation: puff 0.4s ease-out infinite;
  }

  @keyframes puff {
    0% { transform: translateX(0) scale(0.5); opacity: 0.8; }
    100% { transform: translateX(18px) scale(1.8); opacity: 0; }
  }

  @keyframes drive {
    0%   { transform: translateX(-110px); }
    100% { transform: translateX(110vw); }
  }

  .finish-line {
    position: absolute;
    right: 12%;
    bottom: 38%;
    width: 12px;
    height: 120px;
    background: repeating-linear-gradient(
      180deg,
      white 0px, white 10px,
      black 10px, black 20px
    );
    opacity: 0.85;
    z-index: 1;
  }

  .lamppost {
    position: absolute;
    bottom: 38%;
    width: 4px;
    background: #555;
    animation: lampScroll 3s linear infinite;
  }

  .lamppost::before {
    content: '';
    position: absolute;
    top: 0;
    left: -10px;
    width: 14px;
    height: 4px;
    background: #555;
    border-radius: 2px;
  }

  .lamppost::after {
    content: '';
    position: absolute;
    top: -3px;
    left: -12px;
    width: 8px;
    height: 8px;
    background: #ffe680;
    border-radius: 50%;
    box-shadow: 0 0 10px 4px rgba(255,230,100,0.5);
  }

  @keyframes lampScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100vw); }
  }

  .page-wrap {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 2.5rem 2.8rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .card h2 {
    color: #f0c040;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 1.6rem;
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px rgba(240,192,64,0.6);
  }

  .card input#exp {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .card input#exp::placeholder { color: rgba(255,255,255,0.4); }
  .card input#exp:focus {
    border-color: #f0c040;
    background: rgba(255,255,255,0.12);
  }

  .card button {
    margin-top: 1.2rem;
    width: 100%;
    padding: 13px;
    background: #f0c040;
    color: #1a1a2e;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.2s, transform 0.1s;
  }

  .card button:hover { background: #ffd966; }
  .card button:active { transform: scale(0.97); }

  .card h3#result {
    margin-top: 1.4rem;
    font-size: 18px;
    font-weight: 400;
    color: #b8f0c8;
    min-height: 28px;
    text-shadow: 0 0 12px rgba(100,240,160,0.5);
  }

  .speed-badge {
    position: absolute;
    top: -0.8rem;
    right: 1.2rem;
    background: #e63946;
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 2px 10px rgba(230,57,70,0.5);
  }
</style>

<div id="race-bg">
  <div class="sky-layer"></div>
  <div id="stars"></div>
  <div id="mountains"></div>
  <div id="buildings"></div>
  <div id="crowd"></div>
  <div class="road"></div>
  <div id="road-lines"></div>
  <div id="lampposts"></div>
  <div class="finish-line"></div>
  <div id="cars-layer"></div>
</div>

<div class="page-wrap">
  <div class="card" style="position:relative;">
    <div class="speed-badge">⚡ Live Race</div>
    <h2>Salary Predictor</h2>
    <input id="exp" placeholder="Enter experience" autocomplete="off">
    <br><br>
    <button onclick="predict()">Predict</button>
    <h3 id="result"></h3>
  </div>
</div>

<script>
async function predict() {
  let exp = document.getElementById("exp").value;
  let response = await fetch("/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "mysecret123"
    },
    body: JSON.stringify({ experience: exp })
  });
  let data = await response.json();
  if (data.status === "success") {
    document.getElementById("result").innerText = data.prediction;
  } else {
    document.getElementById("result").innerText = data.error;
  }
}

(function buildScene() {
  const bg = document.getElementById('race-bg');
  const W = window.innerWidth || 900;

  const stars = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*58}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
    stars.appendChild(s);
  }

  const mts = document.getElementById('mountains');
  const mtColors = ['#1c1c40','#251f4a','#1a1830','#302060'];
  for (let i = 0; i < 6; i++) {
    const m = document.createElement('div');
    m.className = 'mountain';
    const w = 120 + Math.random() * 160;
    const h = 60 + Math.random() * 100;
    m.style.cssText = `left:${Math.random()*100}%;border-left:${w/2}px solid transparent;border-right:${w/2}px solid transparent;border-bottom:${h}px solid ${mtColors[i%mtColors.length]};bottom:38%`;
    mts.appendChild(m);
  }

  const blds = document.getElementById('buildings');
  for (let i = 0; i < 10; i++) {
    const b = document.createElement('div');
    b.className = 'building';
    const w = 28 + Math.random() * 40;
    const h = 40 + Math.random() * 80;
    b.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${h}px`;
    for (let j = 0; j < 4; j++) {
      const win = document.createElement('div');
      win.className = 'building-win';
      win.style.cssText = `top:${8+j*14}px;left:${4+Math.floor(Math.random()*2)*12}px;animation-delay:${Math.random()*2}s`;
      b.appendChild(win);
    }
    blds.appendChild(b);
  }

  const crowd = document.getElementById('crowd');
  const crowdColors = ['#e63946','#4cc9f0','#f8c100','#a8dadc','#ff99aa','#90e0ef','#ffd166'];
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'crowd-person';
    p.style.cssText = `left:${2+i*2.7}%;background:${crowdColors[i%crowdColors.length]};animation-delay:${Math.random()*0.6}s;animation-duration:${0.4+Math.random()*0.4}s`;
    crowd.appendChild(p);
  }

  const rl = document.getElementById('road-lines');
  for (let i = 0; i < 10; i++) {
    const line = document.createElement('div');
    line.className = 'road-line';
    line.style.cssText = `left:${i*140}px;animation-delay:${-(i*0.7)}s`;
    rl.appendChild(line);
  }

  const lamps = document.getElementById('lampposts');
  for (let i = 0; i < 8; i++) {
    const lp = document.createElement('div');
    lp.className = 'lamppost';
    lp.style.cssText = `left:${i*13+4}%;height:${55+Math.random()*10}px;animation-delay:${-i*0.37}s;animation-duration:${2.5+Math.random()*1}s`;
    lamps.appendChild(lp);
  }

  const cl = document.getElementById('cars-layer');
  const carData = [
    { cls: 'car car1', delay: 0 },
    { cls: 'car car2', delay: 1.4 },
    { cls: 'car car3', delay: 2.8 }
  ];

  carData.forEach(cd => {
    const car = document.createElement('div');
    car.className = cd.cls;
    car.style.animationDelay = `-${cd.delay}s`;

    const stripe = document.createElement('div');
    stripe.className = 'car-stripe';
    car.appendChild(stripe);

    const exhaust = document.createElement('div');
    exhaust.className = 'exhaust';
    car.appendChild(exhaust);

    cl.appendChild(car);
  });
})();
</script>
